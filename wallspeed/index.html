
<!DOCTYPE html>

    <meta charset="UTF-8" />

    <title>Xget URL 转换器</title>

    />

  <body>
    <!-- Main Container -->
    <div class="container">
      <!-- Sponsor Popup Modal -->
      <div id="sponsor-modal" class="modal hidden">
        <div class="modal-content">
          <div class="modal-header">
            <h2>支持我们</h2>
            <span class="close-button" id="close-modal">&times;</span>
          </div>
          <div class="modal-body">
            <p>如果您觉得这个工具有用，欢迎通过以下方式支持我们：</p>
            <div class="modal-links">
              <a

        </div>
      </div>
      <!-- Header Section -->
      <header class="header">
        <h1 class="title">Xget URL 转换器</h1>
        <p class="subtitle">将支持平台的 URL 转换为加速的 Xget 格式</p>
        <p><a href="https://xuc.xi-xu.me">在线转换https://xuc.xi-xu.me</a></p>
        <p><a href="https://github.com/xixu-me/Xget">https://github.com/xixu-me/Xget</a></p>
      </header>

      <!-- Main Content -->
      <main class="main">
        <!-- URL Converter Section -->
        <div class="converter-section">
          <!-- Xget Domain Configuration -->
          <div class="input-group">
            <label for="xget-domain" class="label">
              Xget 域名<span class="label-hint"
                >（自定义 Xget 服务器地址）</span
              >
            </label>
            <input
              type="url"
              id="xget-domain"
              class="input"
              placeholder="https://ggx.maolihui.com"
              value="https://ggx.maolihui.com"
              autocomplete="off"
              spellcheck="false"
            />
          </div>

          <!-- URL Input -->
          <div class="input-group">
            <label for="original-url" class="label">原始 URL</label>
            <input
              type="url"
              id="original-url"
              class="input"
              placeholder="在此粘贴支持平台的 URL"
              autocomplete="off"
              spellcheck="false"
            />
          </div>

          <!-- Platform Detection Status -->
          <div class="platform-status">
            <span class="platform-indicator">
              <span class="platform-dot"></span>
              <span id="platform-name">将自动检测平台</span>
            </span>
          </div>

          <!-- Conversion Result -->
          <div id="result-section" class="result-section hidden">
            <div class="input-group">
              <label for="converted-url" class="label">转换后的 Xget URL</label>
              <div class="output-container">
                <input
                  type="text"
                  id="converted-url"
                  class="input output"
                  readonly
                  placeholder="转换后的 URL 将显示在这里"
                />
                <button id="copy-btn" class="copy-btn" title="复制到剪贴板">
                  <span class="copy-icon">📋</span>
                  <span class="copy-text">复制</span>
                </button>
              </div>
            </div>
          </div>

          <!-- Error Messages -->
          <div id="error-message" class="error-message hidden"></div>
        </div>
      </main>

      <!-- Footer Section -->
      <footer class="footer">
        <div class="footer-content">
          <p class="footer-text">
            由
            <a
              href="https://github.com/xixu-me/Xget"
              target="_blank"
              rel="noopener noreferrer"
              class="footer-link"
            >
              Xget
            </a>
            提供支持
          </p>
          <p class="footer-links">
            <a
              href="https://xi-xu.me/#sponsorships"
              target="_blank"
              rel="noopener noreferrer"
